name: Issue Bot (Ejercicio)

on:
  issues:
    types: [opened]
  issue_comment:
    types: [created]

permissions:
  issues: write
  contents: read

jobs:
  coach:
    runs-on: ubuntu-latest
    steps:
      - name: Responder en el Issue con github-actions[bot]
        uses: actions/github-script@v7
        with:
          script: |
            const isIssue = !!context.payload.issue;
            const issue = context.payload.issue;
            const comment = context.payload.comment?.body || "";

            // 1) Cuando se abre el Issue: bienvenida + reglas
            if (context.eventName === "issues" && context.payload.action === "opened") {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: [
                  " ¡Bienvenido! Este Issue es tu **guía interactiva** del ejercicio.",
                  "",
                  " Cómo funciona:",
                  "- Yo (github-actions[bot]) te iré dejando instrucciones aquí.",
                  "- Cuando completes un paso, escribe **/next** en un comentario.",
                  "",
                  " Paso 1:",
                  "Describe con tus palabras qué es un *commit* y por qué ayuda a colaborar."
                ].join("\n")
              });
              return;
            }

            // 2) Cuando alguien comenta /next: siguiente instrucción (demo)
            if (context.eventName === "issue_comment" && context.payload.action === "created") {
              if (comment.trim() === "/next") {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  body: [
                    " Perfecto. **Paso 2:**",
                    "Crea una rama `feature/mi-primer-cambio` y explica (en texto) qué ventaja tiene trabajar en ramas."
                  ].join("\n")
                });
              }
            }
